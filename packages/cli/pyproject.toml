[project]
name = "live-transcribe-cli"
version = "0.1.0"
description = "Terminal UI for live-transcribe: audio capture, Rich display, transcript file output"
requires-python = ">=3.10"
dependencies = [
    "live-transcribe-core",
    "sounddevice",
    "rich",
]

[project.scripts]
live-transcribe = "live_transcribe_cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/live_transcribe_cli"]

[tool.uv.sources]
live-transcribe-core = { workspace = true }
