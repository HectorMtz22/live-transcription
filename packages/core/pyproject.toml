[project]
name = "live-transcribe-core"
version = "0.1.0"
description = "Real-time transcription engine: VAD, Whisper, speaker diarization, translation, summarization"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "mlx-whisper",
    "mlx-lm",
    "resemblyzer",
    "torch",
    "torchaudio",
    "transformers",
    "sentencepiece",
    "deep-translator",
    "deepl",
    "python-dotenv",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/live_transcribe_core"]
